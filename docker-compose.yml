version: '3'
services:

  # PHP Service
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        user: jules
        uid: 1000
    image: danialkala-app
    container_name: danialkala-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
    networks:
      - danialkala

  # Nginx Service
  nginx:
    image: nginx:alpine
    container_name: danialkala-nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - .:/var/www
      - ./docker-compose/nginx:/etc/nginx/conf.d/
    networks:
      - danialkala

networks:
  danialkala:
    driver: bridge
